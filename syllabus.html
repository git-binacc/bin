<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Complete AI Learning Roadmap</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    /* ─── Reset & Variables ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --bg2:       #0d0d1c;
      --bg3:       #111128;
      --border:    #1c1c38;
      --text:      #d8d8f0;
      --muted:     #5a5a80;
      --white:     #f0f0ff;
      --mono: 'Space Mono', monospace;
      --serif: 'Crimson Pro', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #2a2a50; border-radius: 3px; }

    /* ─── Hero ──────────────────────────────────────────────── */
    .hero {
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,245,196,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 50%, rgba(162,155,254,0.06) 0%, transparent 55%),
        var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 64px 24px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px);
      pointer-events: none;
    }

    .hero-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.35em;
      color: #00f5c4;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s forwards;
    }

    .hero h1 {
      font-family: var(--serif);
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s forwards;
    }

    .hero h1 span { color: #00f5c4; font-weight: 600; }

    .hero-sub {
      font-style: italic;
      color: var(--muted);
      font-size: 17px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.6s 0.3s forwards;
    }

    .stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s forwards;
    }

    .stat-num {
      font-family: var(--mono);
      font-size: 30px;
      color: #00f5c4;
      font-weight: 700;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 2px;
    }

    /* ─── Sticky Nav ────────────────────────────────────────── */
    .phase-nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(7,7,15,0.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      overflow-x: auto;
      white-space: nowrap;
      text-align: center;
    }

    .phase-nav::-webkit-scrollbar { height: 3px; }

    .phase-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid;
      cursor: pointer;
      background: transparent;
      margin: 0 3px;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    .phase-btn:hover { opacity: 0.8; transform: translateY(-1px); }

    /* ─── Main ──────────────────────────────────────────────── */
    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ─── Phase Block ───────────────────────────────────────── */
    .phase-block {
      margin-bottom: 72px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .phase-block.visible { opacity: 1; transform: translateY(0); }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      position: relative;
    }

    .phase-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--phase-color) 0%, transparent 70%);
    }

    .phase-icon-box {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 1px solid;
    }

    .phase-tag {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      margin-bottom: 2px;
    }

    .phase-title {
      font-size: 22px;
      font-weight: 300;
      color: var(--white);
    }

    .phase-counts {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      line-height: 1.7;
      margin-left: auto;
    }

    /* ─── Step Cards ────────────────────────────────────────── */
    .steps-list { display: flex; flex-direction: column; gap: 10px; }

    .step-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg2);
      transition: border-color 0.25s;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      cursor: pointer;
      width: 100%;
      background: transparent;
      border: none;
      text-align: left;
      transition: background 0.2s;
    }

    .step-header:hover { background: rgba(255,255,255,0.02); }

    .step-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.25s;
    }

    .step-info { flex: 1; }

    .step-title {
      font-size: 16px;
      color: var(--text);
      transition: color 0.2s;
    }

    .step-card.open .step-title { color: var(--white); font-weight: 600; }

    .step-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .step-toggle {
      font-size: 22px;
      font-weight: 300;
      color: var(--muted);
      transition: transform 0.3s, color 0.2s;
      line-height: 1;
      user-select: none;
    }

    .step-card.open .step-toggle { transform: rotate(45deg); }

    /* ─── Topics Panel ──────────────────────────────────────── */
    .topics-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1);
    }

    .topics-panel.open { max-height: 3000px; }

    .topics-inner {
      padding: 0 20px 20px 72px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .topic-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 14px;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.55;
      transition: border-color 0.2s;
    }

    .topic-row:hover { border-color: #2a2a50; }

    .topic-num {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      flex-shrink: 0;
      min-width: 20px;
    }

    .topic-text { color: #c0c0dc; }

    /* ─── Progress Bar ──────────────────────────────────────── */
    .progress-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 2px;
      z-index: 9999;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00f5c4, #a29bfe);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* ─── Footer ────────────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 48px 24px;
      border-top: 1px solid var(--border);
    }

    .footer-emoji { font-size: 32px; margin-bottom: 12px; }
    .footer h3 { color: #00f5c4; font-weight: 300; font-size: 22px; margin-bottom: 8px; }
    .footer p { color: var(--muted); font-style: italic; font-size: 15px; }

    /* ─── Animations ────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Responsive ────────────────────────────────────────── */
    @media (max-width: 600px) {
      .topics-inner { padding: 0 12px 16px 12px; }
      .phase-counts { display: none; }
      .stats { gap: 24px; }
    }
  </style>
</head>
<body>

<!-- Progress Bar -->
<div class="progress-wrap">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- Hero -->
<header class="hero">
  <div class="hero-label">Complete Learning Path</div>
  <h1>Master <span>Artificial Intelligence</span></h1>

  <div class="stats">

    <div><div class="stat-num">18–24</div><div class="stat-label">Months</div></div>
  </div>
</header>

<!-- Main Content -->

  <h3>You've reached the frontier.</h3>
  <p>Keep reading papers. Keep building. The field moves fast — stay curious.</p>
</footer>

/* ════════════════════════════════════════════════════════
   BUILD UI
════════════════════════════════════════════════════════ */
const nav  = document.getElementById('phaseNav');
const main = document.getElementById('mainContent');

roadmap.forEach((phase, pi) => {

  /* ── Nav Button ── */
  const btn = document.createElement('button');
  btn.className = 'phase-btn';
  btn.innerHTML = `${phase.icon} ${phase.phase}`;
  btn.style.color = phase.color;
  btn.style.borderColor = phase.color + '66';
  btn.addEventListener('click', () => {
    document.getElementById(`phase-${pi}`)
      ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  nav.appendChild(btn);

  /* ── Phase Block ── */
  const block = document.createElement('section');
  block.className = 'phase-block';
  block.id = `phase-${pi}`;
  block.style.setProperty('--phase-color', phase.color);

  const totalTopics = phase.steps.reduce((a, s) => a + s.topics.length, 0);

  block.innerHTML = `
    <div class="phase-header">
      <div class="phase-icon-box"
           style="background:${phase.color}18; border-color:${phase.color}44;">
        ${phase.icon}
      </div>
      <div class="phase-meta">
        <div class="phase-tag" style="color:${phase.color}">${phase.phase}</div>
        <div class="phase-title">${phase.title}</div>
      </div>
      <div class="phase-counts">${phase.steps.length} steps<br>${totalTopics} topics</div>
    </div>
    <div class="steps-list" id="steps-${pi}"></div>
  `;
  main.appendChild(block);

  const stepsList = block.querySelector(`#steps-${pi}`);

  /* ── Step Cards ── */
  phase.steps.forEach((step) => {
    const card = document.createElement('div');
    card.className = 'step-card';

    card.innerHTML = `
      <button class="step-header" aria-expanded="false">
        <div class="step-num" style="color:${phase.color}; border-color:${phase.color};">
          ${step.step}
        </div>
        <div class="step-info">
          <div class="step-title">${step.title}</div>
          <div class="step-meta">${step.topics.length} topics &nbsp;·&nbsp; ${step.duration}</div>
        </div>
        <div class="step-toggle" style="color:${phase.color};">+</div>
      </button>
      <div class="topics-panel">
        <div class="topics-inner">
          ${step.topics.map((t, i) => `
            <div class="topic-row">
              <span class="topic-num">${String(i + 1).padStart(2, '0')}</span>
              <span class="topic-text">${t}</span>
            </div>`).join('')}
        </div>
      </div>
    `;

    const header = card.querySelector('.step-header');
    const panel  = card.querySelector('.topics-panel');
    const numEl  = card.querySelector('.step-num');

    header.addEventListener('click', () => {
      const open = card.classList.toggle('open');
      panel.classList.toggle('open', open);
      header.setAttribute('aria-expanded', open);
      if (open) {
        numEl.style.background = phase.color;
        numEl.style.color = '#07070f';
        card.style.borderColor = phase.color + '55';
        card.style.background = '#111128';
      } else {
        numEl.style.background = 'transparent';
        numEl.style.color = phase.color;
        card.style.borderColor = '';
        card.style.background = '';
      }
    });

    stepsList.appendChild(card);
  });
});

/* ════════════════════════════════════════════════════════
   SCROLL PROGRESS BAR
════════════════════════════════════════════════════════ */
const fill = document.getElementById('progressFill');
window.addEventListener('scroll', () => {
  const scrolled = document.documentElement.scrollTop;
  const total    = document.documentElement.scrollHeight
                 - document.documentElement.clientHeight;
  fill.style.width = (scrolled / total * 100) + '%';
}, { passive: true });

/* ════════════════════════════════════════════════════════
   INTERSECTION OBSERVER — animate phases in on scroll
════════════════════════════════════════════════════════ */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.05 });

document.querySelectorAll('.phase-block').forEach(el => observer.observe(el));
</script>
